{{/* Identity + CTA Section — verbal identity flowing into action */}}
<section class="section section-void identity-cta-section">
  <div class="section-content identity-cta-content">
    {{ range .Params.identity_blocks }}
    <p class="identity-statement">{{ . | safeHTML }}</p>
    {{ end }}

    {{ with .Params.cta_description }}
    <p class="cta-description">{{ . }}</p>
    {{ end }}

    {{ with .Params.cta_email }}
    <a href="mailto:{{ . }}" class="glow-radiant-core cta-button">
      {{ $.Params.cta_button_text | default "Work With Me" }}
    </a>
    {{ end }}
  </div>
</section>
